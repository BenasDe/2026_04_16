<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Slideshow</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }

        .frame-wrap {
            position: relative;
            width: 100%;
            height: 100%;
            outline: none;
        }

        iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            opacity: 1;
            transition: opacity 0.8s ease-in-out;
            background: #000;
        }

        #viewer.fade-out {
            opacity: 0;
        }

        #preloader {
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
            z-index: -1;
        }

        .pause-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 10;
    backdrop-filter: none;
}

        .pause-overlay.visible {
            opacity: 1;
        }

        .pause-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            color: white;
            text-align: center;
        }

        .pause-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.14);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1.4s infinite ease-in-out;
            box-shadow: 0 0 0 0 rgba(255,255,255,0.25);
        }

        .pause-bars {
            display: flex;
            gap: 10px;
        }

        .pause-bars span {
            display: block;
            width: 10px;
            height: 34px;
            background: white;
            border-radius: 4px;
        }

        .pause-text {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .pause-hint {
            font-size: 14px;
            opacity: 0.8;
        }

        .status-badge {
            position: absolute;
            left: 16px;
            bottom: 16px;
            z-index: 11;
            color: white;
            background: rgba(0,0,0,0.55);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        .controls-panel {
            position: absolute;
            right: 16px;
            bottom: 16px;
            z-index: 20;
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.55);
            padding: 6px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }

        .control-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .control-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.18); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 18px rgba(255,255,255,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }
    </style>
</head>
<body>

<div id="app" class="frame-wrap" tabindex="0">
    <iframe id="viewer" src=""></iframe>
    <iframe id="preloader" src=""></iframe>

    <div id="pauseOverlay" class="pause-overlay">
        <div class="pause-box">
            <div class="pause-icon">
                <div class="pause-bars">
                    <span></span>
                    <span></span>
                </div>
            </div>
            <div class="pause-text">Paused</div>
            <div class="pause-hint">Press Space or click Play to resume</div>
        </div>
    </div>

    <div id="statusBadge" class="status-badge"></div>

    <div class="controls-panel">
        <button id="prevBtn" class="control-btn" type="button" title="Previous (Left Arrow)">
            <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
        </button>
        <button id="playPauseBtn" class="control-btn" type="button" title="Play/Pause (Space)">
            <svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            <svg id="icon-play" viewBox="0 0 24 24" style="display:none;"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button id="nextBtn" class="control-btn" type="button" title="Next (Right Arrow)">
            <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
        </button>
    </div>
</div>

<script>
    const slides = [
        { url: "https://open.geodata.gov.lt/", settleMs: 3000 },
        { url: "https://osp.balticamadeus.online/lt/duomenu-rinkiniai/sd005198?page=1", settleMs: 6000 },
        { url: "https://experience.arcgis.com/experience/c45584925bb94df2a5948253c6685c1e/page/Puslapis?views=VALSTYB%C4%96S-DUOMEN%C5%B2-SURA%C5%A0YMAS", settleMs: 8000 },
        { url: "https://osp.balticamadeus.online/lt/duomenu-rinkiniai?categoryType=LT_ENVI&categoryType=LT_ENVI_3EM&categoryType=LT_ENVI_4IIAE&categoryType=LT_ENVI_4TAC&categoryType=LT_ENVI_4GGAS&categoryType=LT_ENVI_2W&categoryType=LT_ENVI_3PA&categoryType=LT_ENVI_3SA&categoryType=LT_ENVI_3PS&categoryType=LT_ENVI_3SM&categoryType=LT_ENVI_4MFAC&categoryType=LT_ENVI_4MFA&categoryType=LT_ENVI_4M&categoryType=LT_ENVI_3C&categoryType=LT_ENVI_3AQ&categoryType=LT_ENVI_2WH&page=1", settleMs: 6000 },
        { url: "https://experience.arcgis.com/experience/c45584925bb94df2a5948253c6685c1e/page/Puslapis?views=VALSTYB%C4%96S-DUOMEN%C5%B2-E%C5%BDERAS", settleMs: 8000 },
        { url: "https://open.geodata.gov.lt/", settleMs: 3000 },
        { url: "https://experience.arcgis.com/experience/c45584925bb94df2a5948253c6685c1e/page/Puslapis?views=DIDEL%C4%96S-VERT%C4%96S-DUOMENYS", settleMs: 8000 },
        { url: "https://open.geodata.gov.lt/datasets/5c703c313e5d459783a17c70e485344b_0/explore?location=54.680704%2C25.270150%2C15", settleMs: 5000 },
        { url: "https://paslaugos.stat.gov.lt/duomenu-srautai/tarp-instituciju.html", settleMs: 4000 },
        { url: "https://open.geodata.gov.lt/datasets/873ce8253df9417286bb04f7d12c0053_0/explore?location=54.969337%2C24.622391%2C9", settleMs: 5000 },
        { url: "https://open.geodata.gov.lt/apps/5a1fa6163e274825870993aadb151b5e/explore", settleMs: 5000 }
    ];

    const DISPLAY_MS = 35000;
    const FADE_MS = 800;
    const LOAD_TIMEOUT_MS = 15000;

    let currentIndex = 0;
    let isPaused = false;
    let slideTimer = null;
    let navLock = false;
    let fallbackTimer = null;

    const app = document.getElementById("app");
    const viewer = document.getElementById("viewer");
    const preloader = document.getElementById("preloader");
    const pauseOverlay = document.getElementById("pauseOverlay");
    const statusBadge = document.getElementById("statusBadge");

    const prevBtn = document.getElementById("prevBtn");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const nextBtn = document.getElementById("nextBtn");

    const iconPause = document.getElementById("icon-pause");
    const iconPlay = document.getElementById("icon-play");

    function focusShell() {
        app.focus({ preventScroll: true });
    }

    function normalizedIndex(index) {
        return (index + slides.length) % slides.length;
    }

    function updateStatus() {
        const slide = slides[currentIndex];
        statusBadge.textContent = `${isPaused ? "Paused" : "Playing"} • ${currentIndex + 1}/${slides.length}`;
        statusBadge.title = slide.url;
    }

    function clearSlideTimer() {
        if (slideTimer) {
            clearTimeout(slideTimer);
            slideTimer = null;
        }
    }

    function clearFallbackTimer() {
        if (fallbackTimer) {
            clearTimeout(fallbackTimer);
            fallbackTimer = null;
        }
    }

    function setPaused(paused) {
        isPaused = paused;
        pauseOverlay.classList.toggle("visible", paused);

        if (paused) {
            iconPause.style.display = "none";
            iconPlay.style.display = "block";
            clearSlideTimer();
        } else {
            iconPause.style.display = "block";
            iconPlay.style.display = "none";
            scheduleNextAdvance();
        }

        updateStatus();
        focusShell();
    }

    function togglePause() {
        setPaused(!isPaused);
    }

    function scheduleNextAdvance() {
        clearSlideTimer();
        if (isPaused) return;

        slideTimer = setTimeout(() => {
            goToSlide(currentIndex + 1);
        }, DISPLAY_MS);
    }

    function goToSlide(index) {
        if (navLock) return;
        navLock = true;

        clearSlideTimer();
        clearFallbackTimer();

        const nextIndex = normalizedIndex(index);
        const slide = slides[nextIndex];

        viewer.classList.add("fade-out");

        setTimeout(() => {
            let slideLoaded = false;

            const onViewerLoad = () => {
                if (slideLoaded) return;
                slideLoaded = true;

                clearFallbackTimer();
                viewer.onload = null;

                viewer.classList.remove("fade-out");
                currentIndex = nextIndex;
                updateStatus();

                const nextPreloadIndex = normalizedIndex(currentIndex + 1);
                preloader.src = slides[nextPreloadIndex].url;

                if (!isPaused) {
                    scheduleNextAdvance();
                }

                navLock = false;
                focusShell();
            };

            viewer.onload = onViewerLoad;
            viewer.src = slide.url;

            fallbackTimer = setTimeout(onViewerLoad, LOAD_TIMEOUT_MS);
        }, FADE_MS);
    }

    function nextSlide() {
        goToSlide(currentIndex + 1);
    }

    function prevSlide() {
        goToSlide(currentIndex - 1);
    }

    function handleKey(event) {
        const key = event.key;

        if (key === " " || key === "Spacebar") {
            event.preventDefault();
            togglePause();
            return;
        }

        if (key === "ArrowRight") {
            event.preventDefault();
            nextSlide();
            return;
        }

        if (key === "ArrowLeft") {
            event.preventDefault();
            prevSlide();
            return;
        }
    }

    window.addEventListener("keydown", handleKey, true);
    document.addEventListener("keydown", handleKey, true);

    prevBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        prevSlide();
    });

    playPauseBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        togglePause();
    });

    nextBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        nextSlide();
    });

    window.addEventListener("load", () => {
        focusShell();
        updateStatus();
        goToSlide(0);
    });
</script>

</body>
</html>
