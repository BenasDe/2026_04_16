<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Slideshow</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }

        .frame-wrap {
            position: relative;
            width: 100%;
            height: 100%;
            outline: none;
        }

        .slide-frame {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
            z-index: 1;
        }

        .slide-frame.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 2;
        }

        .slide-frame.standby {
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }

        .pause-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.12);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 20;
        }

        .pause-overlay.visible {
            opacity: 1;
        }

        .pause-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            color: white;
            text-align: center;
        }

        .pause-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.14);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1.4s infinite ease-in-out;
            box-shadow: 0 0 0 0 rgba(255,255,255,0.25);
        }

        .pause-bars {
            display: flex;
            gap: 10px;
        }

        .pause-bars span {
            display: block;
            width: 10px;
            height: 34px;
            background: white;
            border-radius: 4px;
        }

        .pause-text {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .pause-hint {
            font-size: 14px;
            opacity: 0.85;
        }

        .status-badge {
            position: absolute;
            left: 16px;
            bottom: 16px;
            z-index: 30;
            color: white;
            background: rgba(0,0,0,0.55);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            pointer-events: none;
            max-width: calc(100vw - 220px);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.3s ease;
        }

        .status-badge.loading {
            background: rgba(180, 100, 0, 0.75);
            animation: badgePulse 1s infinite ease-in-out;
        }

        .controls-panel {
            position: absolute;
            right: 16px;
            bottom: 16px;
            z-index: 30;
            display: flex;
            gap: 8px;
            background: rgba(0,0,0,0.55);
            padding: 6px;
            border-radius: 8px;
        }

        .control-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .control-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0.18); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 18px rgba(255,255,255,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }

        @keyframes badgePulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div id="app" class="frame-wrap" tabindex="0">
    <iframe id="frameA" class="slide-frame"></iframe>
    <iframe id="frameB" class="slide-frame"></iframe>

    <div id="pauseOverlay" class="pause-overlay">
        <div class="pause-box">
            <div class="pause-icon">
                <div class="pause-bars">
                    <span></span>
                    <span></span>
                </div>
            </div>
            <div class="pause-text">Paused</div>
            <div class="pause-hint">Space = resume • ← → = navigate</div>
        </div>
    </div>

    <div id="statusBadge" class="status-badge"></div>

    <div class="controls-panel">
        <button id="prevBtn" class="control-btn" type="button" title="Previous">
            <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg>
        </button>
        <button id="playPauseBtn" class="control-btn" type="button" title="Play/Pause">
            <svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            <svg id="icon-play" viewBox="0 0 24 24" style="display:none;"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button id="nextBtn" class="control-btn" type="button" title="Next">
            <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
        </button>
    </div>
</div>

<script>
    const slides = [
        { url: "https://open.geodata.gov.lt/", settleMs: 3000 },
        { url: "https://experience.arcgis.com/experience/c45584925bb94df2a5948253c6685c1e/page/Puslapis?views=VALSTYB%C4%96S-DUOMEN%C5%B2-SURA%C5%A0YMAS", settleMs: 10000 },
        { url: "https://experience.arcgis.com/experience/c45584925bb94df2a5948253c6685c1e/page/Puslapis?views=VALSTYB%C4%96S-DUOMEN%C5%B2-E%C5%BDERAS", settleMs: 10000 },
        { url: "https://open.geodata.gov.lt/", settleMs: 3000 },
        { url: "https://experience.arcgis.com/experience/c45584925bb94df2a5948253c6685c1e/page/Puslapis?views=DIDEL%C4%96S-VERT%C4%96S-DUOMENYS", settleMs: 10000 },
        { url: "https://open.geodata.gov.lt/datasets/5c703c313e5d459783a17c70e485344b_0/explore?location=54.680704%2C25.270150%2C15", settleMs: 5000 },
        { url: "https://paslaugos.stat.gov.lt/duomenu-srautai/tarp-instituciju.html", settleMs: 4000 },
        { url: "https://open.geodata.gov.lt/datasets/873ce8253df9417286bb04f7d12c0053_0/explore?location=54.969337%2C24.622391%2C9", settleMs: 5000 },
        { url: "https://open.geodata.gov.lt/apps/5a1fa6163e274825870993aadb151b5e/explore", settleMs: 5000 }
    ];

    const DISPLAY_MS = 35000;
    const LOAD_TIMEOUT_MS = 15000;

    let currentIndex = 0;
    let isPaused = false;
    let slideTimer = null;
    let navLock = false;

    let activeFrame = null;
    let standbyFrame = null;

    let standbyPreparedIndex = null;
    let standbyPreparedReady = false;
    let standbyRequestId = 0;

    const app = document.getElementById("app");
    const frameA = document.getElementById("frameA");
    const frameB = document.getElementById("frameB");
    const pauseOverlay = document.getElementById("pauseOverlay");
    const statusBadge = document.getElementById("statusBadge");

    const prevBtn = document.getElementById("prevBtn");
    const playPauseBtn = document.getElementById("playPauseBtn");
    const nextBtn = document.getElementById("nextBtn");

    const iconPause = document.getElementById("icon-pause");
    const iconPlay = document.getElementById("icon-play");

    function normalizedIndex(index) {
        return (index + slides.length) % slides.length;
    }

    function focusShell() {
        app.focus({ preventScroll: true });
    }

    function setStatus(text, loading = false) {
        statusBadge.textContent = text;
        statusBadge.classList.toggle("loading", loading);
    }

    function updateStatus() {
        const slide = slides[currentIndex];
        setStatus(`${isPaused ? "Paused" : "Playing"} • ${currentIndex + 1}/${slides.length}`, false);
        statusBadge.title = slide.url;
    }

    function clearSlideTimer() {
        if (slideTimer) {
            clearTimeout(slideTimer);
            slideTimer = null;
        }
    }

    function scheduleNextAdvance() {
        clearSlideTimer();
        if (isPaused) return;

        slideTimer = setTimeout(() => {
            goToSlide(currentIndex + 1, false);
        }, DISPLAY_MS);
    }

    function setPaused(paused) {
        isPaused = paused;
        pauseOverlay.classList.toggle("visible", paused);

        if (paused) {
            iconPause.style.display = "none";
            iconPlay.style.display = "block";
            clearSlideTimer();
        } else {
            iconPause.style.display = "block";
            iconPlay.style.display = "none";
            scheduleNextAdvance();
        }

        if (!statusBadge.classList.contains("loading")) {
            updateStatus();
        }

        focusShell();
    }

    function togglePause() {
        setPaused(!isPaused);
    }

    function applyFrameClasses() {
        frameA.classList.remove("active", "standby");
        frameB.classList.remove("active", "standby");
        activeFrame.classList.add("active");
        standbyFrame.classList.add("standby");
    }

    function loadSlideIntoFrame(frame, slideIndex) {
        const slide = slides[normalizedIndex(slideIndex)];
        const token = `${Date.now()}-${Math.random()}`;
        frame.dataset.loadToken = token;

        return new Promise((resolve) => {
            let finished = false;

            const complete = () => {
                if (finished) return;
                if (frame.dataset.loadToken !== token) return;

                finished = true;
                frame.onload = null;

                setTimeout(() => {
                    if (frame.dataset.loadToken !== token) return;
                    resolve();
                }, slide.settleMs || 0);
            };

            frame.onload = complete;
            frame.src = slide.url;
            setTimeout(complete, LOAD_TIMEOUT_MS);
        });
    }

    function preloadStandby(targetIndex) {
        const normalizedTarget = normalizedIndex(targetIndex);

        if (standbyPreparedReady && standbyPreparedIndex === normalizedTarget) {
            return Promise.resolve();
        }

        const requestId = ++standbyRequestId;
        standbyPreparedIndex = normalizedTarget;
        standbyPreparedReady = false;

        return loadSlideIntoFrame(standbyFrame, normalizedTarget).then(() => {
            if (requestId !== standbyRequestId) return;
            standbyPreparedReady = true;
        });
    }

    function swapFramesToPrepared(targetIndex) {
        const oldActive = activeFrame;
        activeFrame = standbyFrame;
        standbyFrame = oldActive;

        currentIndex = normalizedIndex(targetIndex);
        standbyPreparedIndex = null;
        standbyPreparedReady = false;

        applyFrameClasses();
        updateStatus();

        if (!isPaused) {
            scheduleNextAdvance();
        }

        preloadStandby(currentIndex + 1);
        focusShell();
    }

    async function goToSlide(index, isManual = true) {
        if (navLock) return;
        navLock = true;
        clearSlideTimer();

        const targetIndex = normalizedIndex(index);

        try {
            if (!(standbyPreparedReady && standbyPreparedIndex === targetIndex)) {
                if (isManual) {
                    setStatus("Loading slide...", true);
                }
                await preloadStandby(targetIndex);
            }

            if (!(standbyPreparedReady && standbyPreparedIndex === targetIndex)) {
                updateStatus();
                return;
            }

            swapFramesToPrepared(targetIndex);
        } finally {
            navLock = false;
        }
    }

    function nextSlide() {
        goToSlide(currentIndex + 1, true);
    }

    function prevSlide() {
        goToSlide(currentIndex - 1, true);
    }

    function handleKey(event) {
        const key = event.key;

        if (key === " " || key === "Spacebar") {
            event.preventDefault();
            togglePause();
            return;
        }

        if (key === "ArrowRight") {
            event.preventDefault();
            nextSlide();
            return;
        }

        if (key === "ArrowLeft") {
            event.preventDefault();
            prevSlide();
            return;
        }
    }

    prevBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        prevSlide();
    });

    playPauseBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        togglePause();
    });

    nextBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        nextSlide();
    });

    window.addEventListener("keydown", handleKey, true);
    document.addEventListener("keydown", handleKey, true);

    window.addEventListener("load", async () => {
        activeFrame = frameA;
        standbyFrame = frameB;
        applyFrameClasses();
        focusShell();

        setStatus("Booting slides...", true);

        await loadSlideIntoFrame(activeFrame, 0);
        currentIndex = 0;
        applyFrameClasses();
        updateStatus();

        preloadStandby(1);

        if (!isPaused) {
            scheduleNextAdvance();
        }
    });
</script>

</body>
</html>
