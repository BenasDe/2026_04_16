<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Slots</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f4f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .logo {
    height: 225px; 
    width: auto;
    margin-bottom: 12px; 
  }

  .reels {
    display: flex;
    gap: 10px;
  }

  .reel-outer {
    position: relative;
    width: 86px;
    height: 106px;
    border-radius: 12px;
    background: #fff;
    border: 1.5px solid #e4e2dc;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .reel-outer::before,
  .reel-outer::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 26px;
    z-index: 2;
    pointer-events: none;
  }
  .reel-outer::before { top: 0;    background: linear-gradient(to bottom, #fff, transparent); }
  .reel-outer::after  { bottom: 0; background: linear-gradient(to top,   #fff, transparent); }

  .reel-strip {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    will-change: transform;
  }

  .reel-cell {
    width: 86px;
    height: 106px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 54px;
    font-weight: 500;
    color: #d0ccc4;
    flex-shrink: 0;
    user-select: none;
    line-height: 1;
  }

  .reel-cell.lit { color: #1e1e1e; }

  .controls {
    display: flex;
    width: 374px; 
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
  }

  .btn-kitas {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1.5px;
    color: #aaa;
    background: none;
    border: none;
    padding: 4px;
    cursor: pointer;
    transition: color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    text-transform: uppercase;
  }

  .btn-kitas:hover:not(:disabled) { color: #555; }
  .btn-kitas:disabled { color: #ccc; cursor: not-allowed; }
</style>
</head>
<body>

<div class="wrap">
  <img src="logo.png" alt="Houston We Have Data" class="logo">
  
  <div class="reels" id="reels"></div>
  <div class="controls">
    <button class="btn-kitas" id="btn-next">kitas</button>
    <button class="btn-kitas" id="btn-reset" title="Reset">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const WORDS_RAW = ['CPVA','MŪZA','GITA','BETA','JĖGA','AČIŪ','JŪSŲ'];

  const EXTRA = 'ĄČĘĖĮŠŲŪŽąčęėįšųūž';
  const BASE   = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  
  function buildAlphabet() {
    const set = new Set();
    for (const c of BASE) set.add(c);
    for (const w of WORDS_RAW) for (const c of w.toUpperCase()) set.add(c);
    return [...set].sort();
  }
  const ALPHABET = buildAlphabet();
  const N = ALPHABET.length;
  const CELL_H = 106;
  const REPS   = 7;
  let wordIndex = 0;
  let spinning  = false;
  const strips  = [];

  const reelsEl = document.getElementById('reels');
  for (let r = 0; r < 4; r++) {
    const outer = document.createElement('div');
    outer.className = 'reel-outer';
    const strip = document.createElement('div');
    strip.className = 'reel-strip';
    for (let rep = 0; rep < REPS; rep++) {
      for (const ch of ALPHABET) {
        const cell = document.createElement('div');
        cell.className = 'reel-cell';
        cell.textContent = ch;
        strip.appendChild(cell);
      }
    }
    strip.style.transform = 'translateY(0px)';
    outer.appendChild(strip);
    reelsEl.appendChild(outer);
    strips.push(strip);
  }

  function easeOutExpo(t) { return t >= 1 ? 1 : 1 - Math.pow(2, -10 * t); }

  function spinReel(reelIndex, targetChar) {
    return new Promise(resolve => {
      const strip   = strips[reelIndex];
      const upChar  = targetChar.toUpperCase();
      const idx     = ALPHABET.indexOf(upChar);
      if (idx < 0) { resolve(); return; }

      strip.querySelectorAll('.reel-cell').forEach(c => c.classList.remove('lit'));
      strip.style.transform = 'translateY(0px)';

      const destRep = 5;
      const targetY = -((destRep * N + idx) * CELL_H);
      const duration = 1500;
      const t0 = performance.now();

      function tick(now) {
        const t = Math.min((now - t0) / duration, 1);
        strip.style.transform = `translateY(${targetY * easeOutExpo(t)}px)`;
        if (t < 1) {
          requestAnimationFrame(tick);
        } else {
          strip.style.transform = `translateY(${targetY}px)`;
          const cell = strip.querySelectorAll('.reel-cell')[destRep * N + idx];
          if (cell) { cell.textContent = targetChar.toUpperCase(); cell.classList.add('lit'); }
          resolve();
        }
      }
      requestAnimationFrame(tick);
    });
  }

  async function doSpin() {
    if (spinning) return;
    spinning = true;
    document.getElementById('btn-next').disabled = true;

    const word = WORDS_RAW[wordIndex % WORDS_RAW.length];
    wordIndex++;

    strips.forEach(s => {
      s.querySelectorAll('.reel-cell').forEach(c => {
        c.classList.remove('lit');
        c.textContent = ALPHABET[
          Array.from(s.querySelectorAll('.reel-cell')).indexOf(c) % N
        ] || c.textContent;
      });
      s.style.transform = 'translateY(0px)';
    });

    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    const chars = [...word].slice(0, 4);
    while (chars.length < 4) chars.push('');

    await Promise.all(
      chars.map((ch, i) => ch ? spinReel(i, ch) : Promise.resolve())
    );

    spinning = false;
    document.getElementById('btn-next').disabled = false;
  }

  function doReset() {
    if (spinning) return; 
    
    wordIndex = 0; 
    
    strips.forEach(s => {
      s.style.transform = 'translateY(0px)'; 
      s.querySelectorAll('.reel-cell').forEach(c => {
        c.classList.remove('lit'); 
        c.textContent = ALPHABET[
          Array.from(s.querySelectorAll('.reel-cell')).indexOf(c) % N
        ] || c.textContent;
      });
    });
  }

  document.getElementById('btn-next').addEventListener('click', doSpin);
  document.getElementById('btn-reset').addEventListener('click', doReset);
  
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); doSpin(); }
  });
</script>
</body>
</html>
